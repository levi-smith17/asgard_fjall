name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      # Prefer Environment secret; fall back to Environment variable if misplaced.
      AWS_API_ROLE_ARN: ${{ secrets.AWS_API_ROLE_ARN || vars.AWS_API_ROLE_ARN }}
      AWS_REGION: us-east-2
      ENVIRONMENT: prod
      LAMBDA_NAME_PREFIX: asgard-fjall-prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify deploy config
        run: |
          if [ -z "$AWS_API_ROLE_ARN" ]; then
            echo "::error::Missing AWS_API_ROLE_ARN on GitHub Environment 'prod'."
            echo "Add it as an Environment secret (not a repo secret alone) at:"
            echo "  https://github.com/levi-smith17/asgard_fjall/settings/environments"
            echo "Name: AWS_API_ROLE_ARN"
            echo "Value: arn:aws:iam::910896517350:role/asgard-fjall-prod-github-api-deploy"
            echo "Then re-run this workflow."
            exit 1
          fi
          echo "Deploying Lambdas with role $AWS_API_ROLE_ARN"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_API_ROLE_ARN }}
          aws-region: us-east-2
      - name: Deploy all Lambda handlers
        run: pnpm --filter @asgard-fjall/api deploy:all
